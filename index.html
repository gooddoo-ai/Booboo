<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 T→F 번역기</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ee;
    --rose: #e8a0a0;
    --rose-dark: #c97b7b;
    --terra: #c97b5a;
    --warm-gray: #8a7a75;
    --dark: #3a2e2e;
    --card: #fff9f4;
    --border: #f0ddd5;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Noto Sans KR’, sans-serif;
background: var(–cream);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 40px 20px 60px;
position: relative;
overflow-x: hidden;
}

/* Background decorations */
body::before {
content: ‘’;
position: fixed;
top: -120px; right: -120px;
width: 400px; height: 400px;
background: radial-gradient(circle, #f5c6c6aa 0%, transparent 70%);
pointer-events: none;
}
body::after {
content: ‘’;
position: fixed;
bottom: -100px; left: -100px;
width: 350px; height: 350px;
background: radial-gradient(circle, #f5d9c6aa 0%, transparent 70%);
pointer-events: none;
}

header {
text-align: center;
margin-bottom: 36px;
animation: fadeDown 0.7s ease both;
}

.badge {
display: inline-block;
background: var(–rose);
color: white;
font-size: 11px;
font-weight: 500;
letter-spacing: 2px;
padding: 4px 14px;
border-radius: 20px;
margin-bottom: 14px;
text-transform: uppercase;
}

h1 {
font-family: ‘Gowun Batang’, serif;
font-size: clamp(26px, 5vw, 38px);
color: var(–dark);
line-height: 1.3;
margin-bottom: 8px;
}

h1 span { color: var(–rose-dark); }

.subtitle {
font-size: 13px;
color: var(–warm-gray);
font-weight: 300;
}

/* Personality tags */
.tags {
display: flex;
gap: 12px;
justify-content: center;
margin-bottom: 32px;
animation: fadeUp 0.7s 0.1s ease both;
}

.tag {
display: flex;
align-items: center;
gap: 6px;
padding: 6px 16px;
border-radius: 30px;
font-size: 13px;
font-weight: 500;
}

.tag-t {
background: #e8f0fe;
color: #3a5bb5;
border: 1px solid #c5d3f8;
}

.tag-f {
background: #fde8ee;
color: #b53a5a;
border: 1px solid #f8c5d3;
}

.arrow-icon {
font-size: 18px;
color: var(–warm-gray);
margin-top: 2px;
}

/* Main card */
.card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 24px;
padding: 32px;
width: 100%;
max-width: 560px;
box-shadow: 0 4px 32px #c97b5a14;
animation: fadeUp 0.7s 0.2s ease both;
}

.section-label {
font-size: 11px;
font-weight: 500;
letter-spacing: 1.5px;
text-transform: uppercase;
color: var(–warm-gray);
margin-bottom: 10px;
display: flex;
align-items: center;
gap: 6px;
}

.section-label::after {
content: ‘’;
flex: 1;
height: 1px;
background: var(–border);
}

textarea {
width: 100%;
background: #fff;
border: 1.5px solid var(–border);
border-radius: 14px;
padding: 16px 18px;
font-family: ‘Noto Sans KR’, sans-serif;
font-size: 15px;
color: var(–dark);
resize: none;
outline: none;
transition: border-color 0.2s;
line-height: 1.7;
min-height: 110px;
}

textarea:focus {
border-color: var(–rose);
}

textarea::placeholder {
color: #c9b8b2;
font-size: 14px;
}

/* Examples */
.examples {
display: flex;
gap: 8px;
flex-wrap: wrap;
margin-top: 10px;
margin-bottom: 24px;
}

.example-chip {
background: #fff;
border: 1px solid var(–border);
border-radius: 20px;
padding: 5px 13px;
font-size: 12px;
color: var(–warm-gray);
cursor: pointer;
transition: all 0.2s;
white-space: nowrap;
}

.example-chip:hover {
background: var(–rose);
color: white;
border-color: var(–rose);
transform: translateY(-1px);
}

/* Mode selector */
.mode-row {
display: flex;
gap: 8px;
margin-bottom: 22px;
flex-wrap: wrap;
}

.mode-btn {
flex: 1;
min-width: 120px;
padding: 8px 10px;
border-radius: 12px;
border: 1.5px solid var(–border);
background: white;
font-family: ‘Noto Sans KR’, sans-serif;
font-size: 12px;
color: var(–warm-gray);
cursor: pointer;
transition: all 0.2s;
text-align: center;
}

.mode-btn.active {
background: var(–rose);
border-color: var(–rose);
color: white;
font-weight: 500;
}

.mode-btn:hover:not(.active) {
border-color: var(–rose);
color: var(–rose-dark);
}

/* Translate button */
.btn-translate {
width: 100%;
padding: 16px;
border-radius: 16px;
border: none;
background: linear-gradient(135deg, var(–rose-dark), var(–terra));
color: white;
font-family: ‘Gowun Batang’, serif;
font-size: 17px;
cursor: pointer;
transition: all 0.25s;
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
margin-bottom: 24px;
box-shadow: 0 4px 16px #c97b5a33;
}

.btn-translate:hover:not(:disabled) {
transform: translateY(-2px);
box-shadow: 0 8px 24px #c97b5a44;
}

.btn-translate:disabled {
opacity: 0.6;
cursor: not-allowed;
transform: none;
}

/* Divider */
.divider {
display: flex;
align-items: center;
gap: 10px;
margin: 4px 0 20px;
opacity: 0.5;
}
.divider-line { flex: 1; height: 1px; background: var(–border); }
.divider-heart { color: var(–rose); font-size: 14px; }

/* Result */
.result-box {
display: none;
background: linear-gradient(135deg, #fff5f7, #fff8f5);
border: 1.5px solid #f5c6d0;
border-radius: 16px;
padding: 20px;
position: relative;
overflow: hidden;
}

.result-box.visible {
display: block;
animation: fadeUp 0.5s ease both;
}

.result-box::before {
content: ‘❝’;
position: absolute;
top: 10px; left: 14px;
font-size: 40px;
color: var(–rose);
opacity: 0.2;
font-family: serif;
line-height: 1;
}

.result-text {
font-family: ‘Gowun Batang’, serif;
font-size: 16px;
color: var(–dark);
line-height: 1.9;
padding-top: 8px;
white-space: pre-wrap;
}

.result-actions {
display: flex;
gap: 8px;
margin-top: 16px;
}

.action-btn {
flex: 1;
padding: 9px;
border-radius: 10px;
border: 1.5px solid var(–border);
background: white;
font-family: ‘Noto Sans KR’, sans-serif;
font-size: 13px;
color: var(–warm-gray);
cursor: pointer;
transition: all 0.2s;
display: flex;
align-items: center;
justify-content: center;
gap: 5px;
}

.action-btn:hover {
border-color: var(–rose);
color: var(–rose-dark);
background: #fff5f7;
}

/* Loading dots */
.loading-dots {
display: none;
align-items: center;
justify-content: center;
gap: 6px;
padding: 24px;
}

.loading-dots.visible { display: flex; }

.dot {
width: 8px; height: 8px;
border-radius: 50%;
background: var(–rose);
animation: bounce 1.2s ease infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

/* Tips footer */
.tip-card {
margin-top: 28px;
background: #fff;
border: 1px solid var(–border);
border-radius: 16px;
padding: 16px 20px;
max-width: 560px;
width: 100%;
animation: fadeUp 0.7s 0.35s ease both;
}

.tip-title {
font-size: 11px;
font-weight: 500;
letter-spacing: 1px;
text-transform: uppercase;
color: var(–rose-dark);
margin-bottom: 10px;
}

.tip-list {
list-style: none;
display: flex;
flex-direction: column;
gap: 6px;
}

.tip-list li {
font-size: 12px;
color: var(–warm-gray);
display: flex;
gap: 8px;
line-height: 1.5;
}

.tip-list li::before {
content: ‘→’;
color: var(–rose);
flex-shrink: 0;
}

/* Animations */
@keyframes fadeDown {
from { opacity: 0; transform: translateY(-20px); }
to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}
@keyframes bounce {
0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
40% { transform: scale(1); opacity: 1; }
}

/* Copied toast */
.toast {
position: fixed;
bottom: 30px;
left: 50%;
transform: translateX(-50%) translateY(20px);
background: var(–dark);
color: white;
padding: 10px 22px;
border-radius: 30px;
font-size: 13px;
opacity: 0;
transition: all 0.3s;
pointer-events: none;
z-index: 100;
}
.toast.show {
opacity: 1;
transform: translateX(-50%) translateY(0);
}
</style>

</head>
<body>

<header>
  <div class="badge">💌 부부 대화 번역기</div>
  <h1>나의 말을<br><span>아내의 언어</span>로</h1>
  <p class="subtitle">극T의 팩폭을 극F가 감동받을 말로 바꿔드립니다</p>
</header>

<div class="tags">
  <div class="tag tag-t">🧠 나 (극T)</div>
  <div class="arrow-icon">→</div>
  <div class="tag tag-f">💕 아내 (극F)</div>
</div>

<div class="card">
  <div class="section-label">내가 하고 싶은 말</div>
  <textarea id="input" placeholder="예) 밥이 좀 짜네&#10;예) 왜 그걸 거기다 놔둬&#10;예) 다음엔 좀 일찍 말해줘" rows="4"></textarea>

  <div class="examples">
    <div class="example-chip" onclick="setExample('밥이 좀 짰어')">밥이 짰어</div>
    <div class="example-chip" onclick="setExample('왜 그거 거기다 뒀어?')">왜 거기다 뒀어?</div>
    <div class="example-chip" onclick="setExample('그냥 집에 있어, 내가 할게')">내가 할게</div>
    <div class="example-chip" onclick="setExample('피곤해서 그냥 자고 싶어')">그냥 자고 싶어</div>
    <div class="example-chip" onclick="setExample('다음엔 미리 말해줘')">미리 말해줘</div>
    <div class="example-chip" onclick="setExample('오늘 왜 그랬어?')">오늘 왜 그랬어?</div>
  </div>

  <div class="section-label">번역 톤</div>
  <div class="mode-row">
    <button class="mode-btn active" data-mode="sweet" onclick="setMode(this)">🍯 달콤하게</button>
    <button class="mode-btn" data-mode="warm" onclick="setMode(this)">☕ 따뜻하게</button>
    <button class="mode-btn" data-mode="funny" onclick="setMode(this)">😄 귀엽게</button>
    <button class="mode-btn" data-mode="sincere" onclick="setMode(this)">🙏 진심으로</button>
  </div>

  <button class="btn-translate" id="translateBtn" onclick="translate()">
    💌 번역하기
  </button>

  <div class="section-label">아내가 듣고 싶은 말</div>

  <div class="loading-dots" id="loading">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="result-box" id="result">
    <div class="result-text" id="resultText"></div>
    <div class="result-actions">
      <button class="action-btn" onclick="copyResult()">📋 복사하기</button>
      <button class="action-btn" onclick="translate()">🔄 다시 번역</button>
    </div>
  </div>
</div>

<div class="tip-card">
  <div class="tip-title">🌸 극T가 알면 좋은 것</div>
  <ul class="tip-list">
    <li>F는 사실보다 <strong>감정을 먼저</strong> 듣고 싶어합니다</li>
    <li>"왜?"보다 <strong>"어떤 기분이었어?"</strong>가 더 통합니다</li>
    <li>지적보다 <strong>공감 한 마디</strong>가 먼저입니다</li>
    <li>정보 전달 전에 <strong>"고마워, 사랑해"</strong>를 붙여보세요</li>
  </ul>
</div>

<div class="toast" id="toast">📋 클립보드에 복사됐어요!</div>

<script>
  let selectedMode = 'sweet';

  function setMode(el) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    selectedMode = el.dataset.mode;
  }

  function setExample(text) {
    document.getElementById('input').value = text;
  }

  const modePrompts = {
    sweet: '달콤하고 애정이 넘치게, 꿀 떨어지는 말투로',
    warm: '따뜻하고 포근하게, 배려심이 느껴지는 말투로',
    funny: '귀엽고 사랑스럽게, 살짝 장난기 있는 말투로',
    sincere: '진심 어린 마음이 느껴지게, 솔직하고 감동적으로',
  };

  async function translate() {
    const input = document.getElementById('input').value.trim();
    if (!input) {
      document.getElementById('input').focus();
      document.getElementById('input').style.borderColor = '#e8a0a0';
      setTimeout(() => { document.getElementById('input').style.borderColor = ''; }, 1000);
      return;
    }

    const btn = document.getElementById('translateBtn');
    const loading = document.getElementById('loading');
    const resultBox = document.getElementById('result');
    const resultText = document.getElementById('resultText');

    btn.disabled = true;
    loading.classList.add('visible');
    resultBox.classList.remove('visible');

    const tone = modePrompts[selectedMode];

    let translated = '';

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 500,
          system: '당신은 부부 대화 번역가입니다. 남편은 극T 성격으로 사실 중심, 직설적입니다. 아내는 극F 성격으로 감정과 공감을 중시합니다. 남편이 하고 싶은 말을 아내가 감동받을 수 있도록 번역해주세요. 규칙: 원래 의미를 유지하면서 따뜻하게 표현, 비판은 부드럽게 변환, 번역된 말만 출력(설명 없이), 자연스러운 한국어 구어체, 1~3문장으로 간결하게.',
          messages: [{ role: 'user', content: '다음 말을 ' + tone + ' 번역해주세요: "' + input + '"' }]
        })
      });

      if (!response.ok) {
        throw new Error('API 응답 오류: ' + response.status);
      }

      const data = await response.json();

      if (data && data.content && data.content.length > 0 && data.content[0].text) {
        translated = data.content[0].text;
      } else {
        translated = '번역 결과를 받아오지 못했어요. 다시 시도해주세요. 🙏';
      }
    } catch (err) {
      translated = '연결에 문제가 생겼어요. 잠시 후 다시 시도해주세요. 🙏';
    }

    loading.classList.remove('visible');
    resultText.textContent = translated;
    resultBox.classList.add('visible');
    btn.disabled = false;
  }

  function copyResult() {
    const text = document.getElementById('resultText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    });
  }

  document.getElementById('input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.ctrlKey) translate();
  });
</script>

</body>
</html>
