<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T to F 번역기</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #fdf6ee; --rose: #e8a0a0; --rose-dark: #c97b7b;
  --terra: #c97b5a; --warm-gray: #8a7a75; --dark: #3a2e2e;
  --card: #fff9f4; --border: #f0ddd5;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans KR',sans-serif; background:var(--cream); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:36px 18px 60px; }
header { text-align:center; margin-bottom:24px; }
.badge { display:inline-block; background:var(--rose); color:white; font-size:11px; letter-spacing:2px; padding:4px 14px; border-radius:20px; margin-bottom:12px; }
h1 { font-family:'Gowun Batang',serif; font-size:30px; color:var(--dark); line-height:1.3; margin-bottom:6px; }
h1 span { color:var(--rose-dark); }
.subtitle { font-size:13px; color:var(--warm-gray); }
.tags { display:flex; gap:12px; justify-content:center; margin-bottom:24px; align-items:center; }
.tag { padding:6px 16px; border-radius:30px; font-size:13px; font-weight:500; }
.tag-t { background:#e8f0fe; color:#3a5bb5; border:1px solid #c5d3f8; }
.tag-f { background:#fde8ee; color:#b53a5a; border:1px solid #f8c5d3; }
.arrow { font-size:16px; color:var(--warm-gray); }
.card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:26px; width:100%; max-width:540px; box-shadow:0 4px 24px #c97b5a12; }
.lbl { font-size:11px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; color:var(--warm-gray); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.lbl::after { content:''; flex:1; height:1px; background:var(--border); }
textarea { width:100%; background:#fff; border:1.5px solid var(--border); border-radius:14px; padding:14px 16px; font-family:'Noto Sans KR',sans-serif; font-size:15px; color:var(--dark); resize:none; outline:none; line-height:1.7; min-height:96px; }
textarea:focus { border-color:var(--rose); }
textarea::placeholder { color:#c9b8b2; font-size:14px; }
.chips { display:flex; gap:8px; flex-wrap:wrap; margin:10px 0 20px; }
.chip { background:#fff; border:1px solid var(--border); border-radius:20px; padding:5px 13px; font-size:12px; color:var(--warm-gray); cursor:pointer; transition:all 0.2s; }
.chip:hover { background:var(--rose); color:white; border-color:var(--rose); }
.modes { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
.mbtn { flex:1; min-width:110px; padding:9px 6px; border-radius:12px; border:1.5px solid var(--border); background:white; font-family:'Noto Sans KR',sans-serif; font-size:13px; color:var(--warm-gray); cursor:pointer; transition:all 0.2s; }
.mbtn.on { background:var(--rose); border-color:var(--rose); color:white; font-weight:500; }
.go { width:100%; padding:16px; border-radius:16px; border:none; background:linear-gradient(135deg,var(--rose-dark),var(--terra)); color:white; font-family:'Gowun Batang',serif; font-size:18px; cursor:pointer; margin-bottom:20px; box-shadow:0 4px 16px #c97b5a33; }
.go:hover { opacity:0.92; }
.go:disabled { opacity:0.55; cursor:not-allowed; }
.dots { display:none; justify-content:center; gap:6px; padding:20px; }
.dots.on { display:flex; }
.dot { width:8px; height:8px; border-radius:50%; background:var(--rose); animation:bop 1.2s ease infinite; }
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
.rbox { display:none; background:linear-gradient(135deg,#fff5f7,#fff8f5); border:1.5px solid #f5c6d0; border-radius:16px; padding:20px; }
.rbox.on { display:block; animation:up .4s ease; }
.rtext { font-family:'Gowun Batang',serif; font-size:16px; color:var(--dark); line-height:2; white-space:pre-wrap; word-break:keep-all; }
.racts { display:flex; gap:8px; margin-top:14px; }
.ract { flex:1; padding:9px; border-radius:10px; border:1.5px solid var(--border); background:white; font-family:'Noto Sans KR',sans-serif; font-size:13px; color:var(--warm-gray); cursor:pointer; transition:all 0.2s; }
.ract:hover { border-color:var(--rose); color:var(--rose-dark); }
.tips { margin-top:22px; background:#fff; border:1px solid var(--border); border-radius:16px; padding:16px 20px; max-width:540px; width:100%; }
.ttl { font-size:11px; font-weight:500; letter-spacing:1px; text-transform:uppercase; color:var(--rose-dark); margin-bottom:10px; }
.tips ul { list-style:none; display:flex; flex-direction:column; gap:7px; }
.tips li { font-size:12.5px; color:var(--warm-gray); display:flex; gap:8px; line-height:1.5; }
.tips li::before { content:'->'; color:var(--rose); }
.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--dark); color:white; padding:10px 22px; border-radius:30px; font-size:13px; opacity:0; transition:all .3s; pointer-events:none; z-index:99; }
.toast.on { opacity:1; transform:translateX(-50%) translateY(0); }
@keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes bop { 0%,80%,100%{transform:scale(.7);opacity:.5} 40%{transform:scale(1);opacity:1} }
</style>
</head>
<body>
<header>
  <div class="badge">부부 대화 번역기</div>
  <h1>나의 말을<br><span>아내의 언어</span>로</h1>
  <p class="subtitle">극T의 직설을 극F가 감동받을 말로 바꿔드립니다</p>
</header>

<div class="tags">
  <div class="tag tag-t">나 (극T)</div>
  <div class="arrow">&#8594;</div>
  <div class="tag tag-f">아내 (극F)</div>
</div>

<div class="card">
  <div class="lbl">내가 하고 싶은 말</div>
  <textarea id="inp" placeholder="예) 밥이 좀 짜네&#10;예) 왜 그걸 거기다 놔둬&#10;예) 다음엔 좀 일찍 말해줘" rows="4"></textarea>

  <div class="chips">
    <div class="chip" onclick="se('밥이 좀 짰어')">밥이 짰어</div>
    <div class="chip" onclick="se('왜 그거 거기다 뒀어?')">왜 거기다 뒀어?</div>
    <div class="chip" onclick="se('그냥 집에 있어, 내가 할게')">내가 할게</div>
    <div class="chip" onclick="se('피곤해서 그냥 자고 싶어')">그냥 자고 싶어</div>
    <div class="chip" onclick="se('다음엔 미리 말해줘')">미리 말해줘</div>
    <div class="chip" onclick="se('오늘 왜 그랬어?')">오늘 왜 그랬어?</div>
  </div>

  <div class="lbl">번역 톤</div>
  <div class="modes">
    <button class="mbtn on" onclick="sm(this,'sweet')">🍯 달콤하게</button>
    <button class="mbtn" onclick="sm(this,'warm')">☕ 따뜻하게</button>
    <button class="mbtn" onclick="sm(this,'funny')">😄 귀엽게</button>
    <button class="mbtn" onclick="sm(this,'sincere')">🙏 진심으로</button>
  </div>

<button class="go" id="gbtn" onclick="go()">💌 번역하기</button>

  <div class="lbl">아내가 듣고 싶은 말</div>

  <div class="dots" id="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <div class="rbox" id="rbox">
    <div class="rtext" id="rtxt"></div>
    <div class="racts">
      <button class="ract" onclick="cp()">📋 복사하기</button>
      <button class="ract" onclick="go()">🔄 다시 번역</button>
    </div>
  </div>
</div>

<div class="tips">
  <div class="ttl">🌸 극T가 알면 좋은 것</div>
  <ul>
    <li>F는 사실보다 감정을 먼저 듣고 싶어합니다</li>
    <li>"왜?"보다 "어떤 기분이었어?"가 더 통합니다</li>
    <li>지적보다 공감 한 마디가 먼저입니다</li>
    <li>정보 전달 전에 "고마워, 사랑해"를 붙여보세요</li>
  </ul>
</div>

<div class="toast" id="toast">복사됐어요!</div>

<script>
var mode = 'sweet';
var tones = {
  sweet: '달콤하고 애정이 넘치게',
  warm: '따뜻하고 포근하게',
  funny: '귀엽고 사랑스럽게',
  sincere: '진심이 느껴지게'
};

function se(t) { document.getElementById('inp').value = t; }

function sm(el, m) {
  document.querySelectorAll('.mbtn').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  mode = m;
}

function show(txt) {
  document.getElementById('dots').classList.remove('on');
  document.getElementById('rtxt').textContent = txt;
  document.getElementById('rbox').classList.add('on');
  document.getElementById('gbtn').disabled = false;
}

function go() {
  var v = document.getElementById('inp').value;
  v = v ? v.trim() : '';
  if (!v) {
    document.getElementById('inp').style.borderColor = '#e8a0a0';
    setTimeout(function(){ document.getElementById('inp').style.borderColor = ''; }, 900);
    return;
  }
  document.getElementById('gbtn').disabled = true;
  document.getElementById('dots').classList.add('on');
  document.getElementById('rbox').classList.remove('on');

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 400,
      system: '당신은 부부 대화 번역가입니다. 남편(극T)의 직설적인 말을 아내(극F)가 기분좋게 받아들이도록 번역해주세요. 번역된 말만 출력하고 설명은 하지 마세요. 1~3문장으로.',
      messages: [{ role: 'user', content: tones[mode] + ' 스타일로 번역: ' + v }]
    })
  })
  .then(function(r){ return r.text(); })
  .then(function(t){
    var d;
    try { d = JSON.parse(t); } catch(e) { show('[파싱 오류] ' + t.slice(0,80)); return; }
    if (d.error) { show('[API 오류] ' + d.error.type + ': ' + d.error.message); return; }
    if (d.content && d.content[0] && d.content[0].text) { show(d.content[0].text); }
    else { show('[응답 오류] ' + t.slice(0,100)); }
  })
  .catch(function(e){ show('[오류] ' + (e.message || String(e))); });
}

function cp() {
  var t = document.getElementById('rtxt').textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(t).then(function(){
      var el = document.getElementById('toast');
      el.classList.add('on');
      setTimeout(function(){ el.classList.remove('on'); }, 2000);
    });
  }
}
</script>

</body>
</html>
